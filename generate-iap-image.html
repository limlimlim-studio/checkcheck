<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>IAP Image Generator</title>
</head>
<body style="background:#111;display:flex;flex-direction:column;align-items:center;padding:20px;">
  <canvas id="canvas" width="1024" height="1024" style="width:512px;height:512px;border:1px solid #333;"></canvas>
  <button onclick="download()" style="margin-top:16px;padding:12px 32px;font-size:16px;cursor:pointer;">PNG 다운로드</button>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = 1024, H = 1024;

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function draw() {
      // Background gradient
      const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 600);
      bg.addColorStop(0, '#272B42');
      bg.addColorStop(1, '#1E2030');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      const cx = W / 2;
      const cy = H / 2 - 50;
      const R = 180; // no-sign radius

      // Ad banner card
      const bw = 500, bh = 110;
      ctx.fillStyle = '#2E3356';
      roundRect(ctx, cx - bw/2, cy - bh/2, bw, bh, 16);
      ctx.fill();

      // AD badge
      ctx.fillStyle = '#4A4F7A';
      roundRect(ctx, cx - bw/2 + 18, cy - 22, 54, 44, 8);
      ctx.fill();
      ctx.fillStyle = '#8890BB';
      ctx.font = 'bold 24px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('AD', cx - bw/2 + 18 + 27, cy);

      // Banner text lines
      ctx.fillStyle = '#3E4470';
      roundRect(ctx, cx - bw/2 + 90, cy - 20, 220, 16, 4);
      ctx.fill();
      roundRect(ctx, cx - bw/2 + 90, cy + 8, 150, 12, 4);
      ctx.fill();

      // Prohibition circle
      ctx.save();
      ctx.strokeStyle = '#FF3A4A';
      ctx.lineWidth = 26;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.stroke();

      // Diagonal line (top-left to bottom-right, 45 deg)
      const diag = R * Math.cos(Math.PI / 4);
      ctx.beginPath();
      ctx.moveTo(cx - diag, cy - diag);
      ctx.lineTo(cx + diag, cy + diag);
      ctx.stroke();
      ctx.restore();

      // Glow effect on no-sign
      ctx.save();
      ctx.strokeStyle = 'rgba(255, 58, 74, 0.15)';
      ctx.lineWidth = 50;
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      // Main text: 광고 없음
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 88px "Apple SD Gothic Neo", "Noto Sans KR", Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('광고 없음', cx, cy + R + 110);

      // Subtitle
      ctx.fillStyle = '#7B82AA';
      ctx.font = '40px "Apple SD Gothic Neo", "Noto Sans KR", Arial';
      ctx.fillText('일회성 구매 · 영구 제거', cx, cy + R + 195);

      // Small decorative dots
      const dotColor = 'rgba(255, 58, 74, 0.4)';
      [[cx - 280, cy + R + 152], [cx + 280, cy + R + 152]].forEach(([dx, dy]) => {
        ctx.beginPath();
        ctx.arc(dx, dy, 5, 0, Math.PI * 2);
        ctx.fillStyle = dotColor;
        ctx.fill();
      });
    }

    function download() {
      draw();
      const link = document.createElement('a');
      link.download = 'iap-remove-ads-1024.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    draw();
  </script>
</body>
</html>
